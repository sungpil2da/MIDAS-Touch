<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDAS TOUCH — 그림자 감사 · 판단 유지 측정</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCA2NCA2NCc+PHJlY3Qgd2lkdGg9JzY0JyBoZWlnaHQ9JzY0JyByeD0nMTMnIGZpbGw9JyMxNjE4MUQnLz48cmVjdCB4PScxNicgeT0nNDUnIHdpZHRoPSczMicgaGVpZ2h0PSczLjUnIHJ4PScxLjc1JyBmaWxsPScjMTJBMTg3Jy8+PHRleHQgeD0nMzInIHk9JzQxJyBmb250LWZhbWlseT0nR2VvcmdpYSxzZXJpZicgZm9udC1zaXplPSczOCcgZm9udC13ZWlnaHQ9JzcwMCcgdGV4dC1hbmNob3I9J21pZGRsZScgZmlsbD0nI0Y0RjVGNyc+TTwvdGV4dD48L3N2Zz4=">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MIDAS TOUCH">
<meta name="theme-color" content="#0B0C0E">
<style>
  :root{
    --ink:#16181D; --paper:#FFFFFF; --canvas:#EDF0F3; --panel:#F4F6F8; --line:#D9DDE3;
    --muted:#5B6470; --muted2:#8A93A0;
    --teal:#0E7A66; --teal-d:#12A187; --tealsoft:#E6F3EF; --tealline:#B7DBD3;
    --steel:#36414E; --steelsoft:#EAEEF1; --steelline:#CDD6DE;
    --red:#C2352C; --red-d:#A3271F; --redsoft:#FBECEA; --redline:#E7C0BB;
    --gold:#A9791B; --gold-d:#C79320; --goldsoft:#FBF3DF; --goldline:#E7D3A0;
    --orange:#C25E18; --orangesoft:#FBEFE3; --orangeline:#EBCBAC;
    --radius:12px; --shadow:0 1px 2px rgba(20,24,32,.05), 0 8px 24px rgba(20,24,32,.06);
    --kr:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",Pretendard,"Noto Sans KR",sans-serif;
    --serif:Georgia,"Times New Roman",serif;
    --mono:"SF Mono",ui-monospace,Consolas,"Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--kr); color:var(--ink); background:var(--canvas); line-height:1.5; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer} input,select,textarea{font-family:inherit}
  :focus-visible{outline:2.5px solid var(--teal-d); outline-offset:2px; border-radius:4px}
  a{color:var(--teal)}

  /* header */
  header.top{background:var(--ink); color:#F4F5F7;}
  .top-inner{max-width:1180px; margin:0 auto; padding:15px 22px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .brand{display:flex; align-items:baseline; gap:11px; flex:1; min-width:230px;}
  .wordmark{font-family:var(--serif); font-weight:700; font-size:23px; letter-spacing:.4px; color:#fff;}
  .wordmark .sh{color:#B9C0C9; text-shadow:2px 2px 0 rgba(255,255,255,.06);}
  .brand .tag{font-size:12px; color:#9BA3AE; font-weight:600;} .brand .tag b{color:var(--teal-d)}
  .team{font-size:11px; color:#7D8794; text-align:right; line-height:1.4;} .team b{color:#C7CDD5}
  .synced{font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;gap:5px;color:#8A93A0}
  .synced .dot{width:7px;height:7px;border-radius:50%;background:#4b5563}
  .synced.on .dot{background:var(--teal-d)} .synced.on{color:var(--teal-d)}
  nav.tabs{display:flex; gap:4px; background:#20242B; padding:4px; border-radius:10px; flex-wrap:wrap;}
  nav.tabs button{border:0; background:transparent; color:#AEB6C0; font-size:12.5px; font-weight:700; padding:8px 13px; border-radius:7px;}
  nav.tabs button.active{background:var(--teal); color:#fff;}
  .projbar{background:#0f1114;border-top:1px solid #262b33;}
  .projbar-inner{max-width:1180px;margin:0 auto;padding:9px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .projbar label{font-size:10.5px;color:#7D8794;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .projbar select{background:#1B1F26;color:#E7EAEE;border:1px solid #2E333C;border-radius:7px;padding:6px 9px;font-size:12.5px;font-weight:600;min-width:200px}
  .projbar .mini{background:#1B1F26;color:#AEB6C0;border:1px solid #2E333C;border-radius:7px;padding:6px 10px;font-size:11.5px;font-weight:700}
  .projbar .mini:hover{border-color:var(--teal-d);color:#fff}

  main{max-width:1180px; margin:0 auto; padding:20px 22px 70px;}
  .view{display:none} .view.active{display:block}
  .grid2{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
  .grid2 .side{position:sticky;top:14px;display:flex;flex-direction:column;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}.grid2 .side{position:static}}

  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px;}
  .card:last-child{margin-bottom:0}
  .card-pad{padding:16px 18px;}
  .card h2{margin:0; font-size:15px; font-weight:800; letter-spacing:-.2px; display:flex; align-items:center; gap:9px;}
  .card h2 .ey{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--muted2);font-weight:700;text-transform:uppercase;margin-left:auto}
  .card .sub{color:var(--muted); font-size:12px; margin-top:3px; line-height:1.45}
  .divide{height:1px; background:var(--line); margin:13px 0;}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:700;padding:9px 15px;border-radius:9px}
  .btn:hover{border-color:var(--muted2)}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn.primary:hover{background:#0c6b59}
  .btn.ink{background:var(--ink);border-color:var(--ink);color:#fff}
  .btn.lg{padding:12px 20px;font-size:14px}
  .btn.block{display:block;width:100%;text-align:center}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* MIDAS axis tokens */
  .ax-M{--axc:var(--steel)} .ax-I{--axc:var(--teal)} .ax-D{--axc:var(--gold-d)} .ax-A{--axc:var(--orange)} .ax-S{--axc:var(--red)}
  .axchip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;background:color-mix(in srgb,var(--axc) 12%,#fff);color:var(--axc);border:1px solid color-mix(in srgb,var(--axc) 32%,#fff)}
  .axletter{font-family:var(--serif);font-weight:800;width:18px;height:18px;border-radius:5px;display:grid;place-items:center;color:#fff;background:var(--axc);font-size:12px;flex:none}

  /* risk map */
  .rmap .st{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .rmap .st:first-child{border-top:0}
  .rmap .snm{font-size:12.5px;font-weight:700;width:110px;flex:none}
  .rmap .bar{flex:1;height:8px;background:var(--panel);border-radius:5px;overflow:hidden}
  .rmap .bar i{display:block;height:100%;border-radius:5px}
  .badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:6px;width:74px;text-align:center;flex:none}
  .b-g{background:var(--tealsoft);color:var(--teal)} .b-y{background:var(--goldsoft);color:#6b4d0f}
  .b-o{background:var(--orangesoft);color:var(--orange)} .b-r{background:var(--redsoft);color:var(--red)}
  .f-g{background:var(--teal)} .f-y{background:var(--gold-d)} .f-o{background:var(--orange)} .f-r{background:var(--red)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:10.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .legend .lg{display:inline-flex;align-items:center;gap:5px} .legend .sw{width:9px;height:9px;border-radius:2px}
  .rmap .cnt{font-family:var(--mono);font-size:10px;color:var(--muted2);width:46px;text-align:right;flex:none}

  /* metrics */
  .mtri{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
  .metric .mv{font-family:var(--mono);font-size:22px;font-weight:800;line-height:1;color:var(--ink)}
  .metric .mv small{font-size:12px;color:var(--muted2)}
  .metric .ml{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:5px;line-height:1.3}
  .metric.a .mv{color:var(--steel)} .metric.b .mv{color:var(--gold-d)} .metric.c .mv{color:var(--teal)}

  /* MIDAS distribution */
  .dist{display:flex;flex-direction:column;gap:7px}
  .dist .dr{display:flex;align-items:center;gap:9px}
  .dist .dbar{flex:1;height:16px;background:var(--panel);border-radius:5px;overflow:hidden;position:relative}
  .dist .dbar i{display:block;height:100%;background:var(--axc);border-radius:5px;min-width:2px}
  .dist .dnm{font-size:11px;font-weight:700;width:150px;flex:none;display:flex;align-items:center;gap:7px}
  .dist .dct{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);width:26px;text-align:right;flex:none}

  /* probe runner */
  .scene{border:1px solid var(--steelline);border-radius:12px;overflow:hidden;background:#fff}
  .scene .sc-top{background:var(--ink);color:#EDEFF2;padding:12px 16px;display:flex;align-items:center;gap:9px}
  .scene .sc-top .dot{width:9px;height:9px;border-radius:50%;background:var(--teal-d);flex:none}
  .scene .sc-top .tt{font-size:14px;font-weight:800}
  .scene .sc-top .tg{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:#9BA3AE;letter-spacing:.05em}
  .scene .sc-body{padding:15px 16px}
  .sc-lab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:8px}
  .dataline{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-top:1px dashed var(--line);font-size:13px}
  .dataline:first-of-type{border-top:0}
  .dataline .k{color:var(--muted)} .dataline .v{font-weight:800} .dataline .v.warn{color:var(--gold-d)}
  .prompt{font-size:13.5px;font-weight:700;margin:13px 0 10px;line-height:1.5}
  .ai-hidden{background:#1B1F26;border-radius:9px;padding:14px;text-align:center;margin:11px 0;background-image:repeating-linear-gradient(45deg,#1B1F26,#1B1F26 8px,#20242b 8px,#20242b 16px)}
  .ai-hidden .lk{color:#E7EAEE;font-weight:800;font-size:13px} .ai-hidden .lk2{color:#8A93A0;font-size:10.5px;margin-top:2px}
  .ai-shown{position:relative;border:1px solid var(--line);border-left:3px solid var(--gold-d);border-radius:9px;padding:12px 14px;margin:11px 0;background:#fff}
  .ai-shown .ail{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);font-weight:700}
  .ai-shown .aiv{font-size:15px;font-weight:800;color:var(--teal-d);margin-top:2px}
  .ai-shown .aic{font-size:11px;color:var(--muted);margin-top:2px}
  .ai-shown .trap-tag{position:absolute;top:11px;right:12px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--red-d);background:var(--redsoft);border:1px solid var(--redline);border-radius:5px;padding:2px 7px;display:none}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
  .choices button{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px;font-weight:700;padding:11px 6px;border-radius:9px;line-height:1.25;text-align:center}
  .choices button:hover{border-color:var(--muted2);color:var(--ink)}
  .choices button.sel{border-color:var(--teal);background:var(--tealsoft);color:var(--teal)}
  @media(max-width:560px){.choices{grid-template-columns:1fr 1fr}}

  /* reveal panel */
  .reveal{border-radius:11px;padding:14px 16px;margin-top:14px;border:1px solid var(--line)}
  .reveal.good{background:var(--tealsoft);border-color:var(--tealline)}
  .reveal.signal{background:var(--redsoft);border-color:var(--redline)}
  .reveal.warn{background:var(--goldsoft);border-color:var(--goldline)}
  .reveal .rv-h{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
  .reveal.good .rv-h{color:var(--teal)} .reveal.signal .rv-h{color:var(--red)} .reveal.warn .rv-h{color:#6b4d0f}
  .reveal .rv-row{font-size:12.5px;margin-top:8px;color:var(--ink);line-height:1.5}
  .reveal .rv-row b{font-weight:800}
  .rv-cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .rv-cmp .rc{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px}
  .rv-cmp .rc .rl{font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .rv-cmp .rc .rvv{font-weight:800;margin-top:2px}

  /* classify */
  .clf{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
  .clf-q{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:7px}
  .axgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .axbtn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 5px 8px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .axbtn:hover{border-color:var(--axc)}
  .axbtn .axl{font-family:var(--serif);font-size:19px;font-weight:800;color:var(--axc);line-height:1}
  .axbtn .axn{font-size:9.5px;font-weight:700;color:var(--muted);line-height:1.15}
  .axbtn.sel{border-color:var(--axc);background:color-mix(in srgb,var(--axc) 9%,#fff)}
  .axbtn.suggest{box-shadow:0 0 0 2px color-mix(in srgb,var(--axc) 35%,#fff) inset}
  .sugnote{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.45} .sugnote b{color:var(--ink)}
  @media(max-width:560px){.axgrid{grid-template-columns:repeat(3,1fr)}}

  /* memory / rehearsal list */
  .caselist{display:flex;flex-direction:column;gap:9px}
  .caserow{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:#fff;display:flex;align-items:flex-start;gap:11px}
  .caserow .cx{flex:1;min-width:0}
  .caserow .ct{font-size:13px;font-weight:800}
  .caserow .cm{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
  .caserow .cmeta{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap}
  .caserow .cstatus{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap;flex:none}
  .cs-pending{background:var(--panel);color:var(--muted)} .cs-done{background:var(--tealsoft);color:var(--teal)} .cs-open{background:var(--goldsoft);color:#6b4d0f}
  .pillrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .fpill{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:20px}
  .fpill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .empty{text-align:center;color:var(--muted2);font-size:12.5px;padding:26px 12px;line-height:1.6}
  .empty b{color:var(--muted);display:block;font-size:13.5px;margin-bottom:3px}

  /* toast + modal */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.28s;z-index:100;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .modal-bg{position:fixed;inset:0;background:rgba(15,17,20,.5);display:none;align-items:center;justify-content:center;z-index:90;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;box-shadow:var(--shadow);max-width:440px;width:100%;padding:20px}
  .modal h3{margin:0 0 4px;font-size:16px}
  .modal p{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5}
  .modal .lab{display:block;font-size:11.5px;font-weight:700;margin:10px 0 5px}
  .modal input,.modal textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px}
  .modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .rehearse-in{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;margin-top:8px}
  .foot-note{font-size:11px;color:var(--muted2);text-align:center;margin-top:22px;line-height:1.6}
  /* v2: AI badge, loading, textarea, stage editor, banner */
  .aibadge{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:20px;background:#2a2f37;color:#8A93A0}
  .aibadge.on{background:rgba(18,161,135,.2);color:#3fd0b4}
  .loadcard{display:flex;flex-direction:column;align-items:center;gap:14px;padding:52px 20px;text-align:center}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loadcard .lt{font-size:13.5px;font-weight:800;color:var(--ink)} .loadcard .ls{font-size:11.5px;color:var(--muted)}
  .ans-lab{font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 7px}
  .ans-in{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.55;min-height:92px;resize:vertical;font-family:inherit;color:var(--ink)}
  .ans-in:focus{border-color:var(--teal-d)}
  .aibanner{background:var(--goldsoft);border:1px solid var(--goldline);border-radius:10px;padding:11px 14px;font-size:12px;color:#6b4d0f;line-height:1.5;margin-bottom:16px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .aibanner b{color:#5a3f0c}
  .stage-edit{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .stagerow{display:flex;gap:7px;align-items:center}
  .stagerow .idx{font-family:var(--mono);font-size:11px;color:var(--muted2);width:18px;flex:none;text-align:right}
  .stagerow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
  .stagerow .del{border:1px solid var(--line);background:#fff;color:var(--red);border-radius:8px;width:32px;height:34px;flex:none;font-size:16px;font-weight:800;line-height:1}
  .addstage{border:1px dashed var(--line);background:var(--panel);color:var(--muted);border-radius:8px;padding:9px;font-size:12px;font-weight:700;margin-top:6px;width:100%}
  .addstage:hover{border-color:var(--teal-d);color:var(--teal)}
  .rv-explain{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.55;background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .rv-explain b{color:var(--ink)}
  .modal-scroll{max-height:80vh;overflow:auto}
  .modal code{background:var(--panel);padding:1px 5px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="wordmark">MIDAS <span class="sh">TOUCH</span></span>
      <span class="tag">AI의 답을 가려, <b>인간의 판단</b>이 보인다</span>
    </div>
    <nav class="tabs" id="tabs">
      <button data-view="dash" class="active">대시보드</button>
      <button data-view="probe">그림자 감사</button>
      <button data-view="memory">Shadow Memory</button>
      <button data-view="rehearse">오답 리허설</button>
    </nav>
    <div class="team">
      <div><b>TEAM Pactolus</b> · 미다스를 씻어낸 강</div>
      <div class="synced" id="sync"><span class="dot"></span><span id="syncTxt">로컬 저장</span></div>
    </div>
  </div>
  <div class="projbar">
    <div class="projbar-inner">
      <label>프로젝트</label>
      <select id="projSel"></select>
      <button class="mini" id="addProj">+ 새 프로젝트</button>

/* ---------- AI 연동 (Claude) ----------
   배포(Netlify) 시 AI 문항 생성·판정에는 Anthropic API 키가 필요합니다.
   키는 이 브라우저(localStorage)에만 저장됩니다. 팀 공용 키는 서버리스 프록시를 권장합니다. */
const AI_MODEL="claude-sonnet-4-6";        // 보유 모델로 변경 가능
const AI_KEY_LS="midas_ai_key";
function getKey(){ try{return localStorage.getItem(AI_KEY_LS)||"";}catch(e){return "";} }
function aiOn(){ return !!getKey(); }
async function callClaude(messages, system, maxTokens){
  const body={model:AI_MODEL, max_tokens:maxTokens||800, messages};
  if(system) body.system=system;
  const headers={"content-type":"application/json"};
  const key=getKey();
  if(key){ headers["x-api-key"]=key; headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify(body)});
  if(!res.ok){ let t=""; try{t=await res.text();}catch(e){} throw new Error("API "+res.status+(t?" · "+t.slice(0,140):"")); }
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
function extractJSON(txt){
  if(!txt) throw new Error("빈 응답");
  let s=txt.trim();
  s=s.replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  const a=s.indexOf("{"), b=s.lastIndexOf("}");
  if(a>=0&&b>a) s=s.slice(a,b+1);
  return JSON.parse(s);
}
function cleanAxis(x){ return ((x||"")+"").toUpperCase().replace(/[^MIDAS]/g,"").slice(0,1); }
const AXES_TEXT="M·I·D·A·S 축 — M(Model Gap): AI 모델이 인간이 본 위험 신호를 놓침. I(Insight Gap): AI 입력 정보나 인간의 암묵지가 빠짐. D(Decision-rule Gap): 판단 기준 자체가 애매/불명확. A(Auditor Gap): 인간 검토자가 과잉 의심하거나 AI를 무비판 수용. S(System Alert): 같은 단계·유형에서 반복.";

async function generateProbe(project, stage, type){
  const sys="너는 'MIDAS TOUCH'(인간이 AI 옆에서도 독립적 판단력을 유지하는지 측정하는 그림자 감사 도구)의 감사 문항 생성기다. 반드시 유효한 JSON만 출력하고 마크다운·설명은 절대 쓰지 마라.";
  const typeDesc = type==="blind"
    ? "유형 blind(Blind Shadow): 원자료·상황과 인간이 내려야 할 판단 질문을 제시한다. 인간에게 AI 답은 보여주지 않는다(단 타당한 정답은 JSON에 포함)."
    : "유형 trap(Shadow Trap): 원자료와 함께 '미묘하게 틀린' AI 판단을 제시한다 — 부주의한 검토자는 그대로 수용할 만큼 그럴듯하지만 자료에 비추면 결함이 있다.";
  const usr="프로젝트: \""+project.name+"\""+(project.domain?" (분야: "+project.domain+")":"")+"\n프로젝트 단계: \""+stage+"\"\n문항 유형: "+type+" — "+typeDesc+"\n이 단계에서 실제로 내려야 할 현실적 판단 상황을 하나 만들어라. 도메인에 맞는 구체적 수치·조건을 사용.\n아래 JSON 스키마로만 응답:\n{\"title\":\"짧은 제목(18자 이내)\",\"context\":[{\"k\":\"항목\",\"v\":\"값\",\"warn\":true},{\"k\":\"항목\",\"v\":\"값\",\"warn\":false},{\"k\":\"항목\",\"v\":\"값\",\"warn\":false}],\"prompt\":\"인간이 답할 판단 질문(한 문장)\",\"aiAnswer\":\"AI 권장 판단(한 줄, "+(type==="trap"?"미묘하게 틀린":"타당한")+" 판단)\",\"aiWrong\":"+(type==="trap"?"true":"false")+",\"correct\":\"정답/타당 판단과 이유(한 줄)\",\"hintAxis\":\"M|I|D|A|S\"}\n한국어로.";
  const j=extractJSON(await callClaude([{role:"user",content:usr}], sys, 700));
  return {
    type, stage, title:(j.title||"감사 문항").slice(0,40),
    context:(Array.isArray(j.context)?j.context:[]).slice(0,3).map(c=>({k:String(c.k||""),v:String(c.v||""),warn:!!c.warn})),
    prompt:j.prompt||"이 상황에서 어떤 판단을 내리겠습니까?",
    aiAnswer:j.aiAnswer||"", aiConf:90+Math.floor(Math.random()*8),
    aiWrong: type==="trap" ? (j.aiWrong!==false) : false,
    correctText:j.correct||"", hintAxis:cleanAxis(j.hintAxis)||"D",
    answerMode:"text", mode:"ai"
  };
}
async function judgeBlind(sc, humanText){
  const sys="너는 MIDAS TOUCH 그림자 감사의 평가자다. 인간이 서술한 판단을 AI 판단·정답과 비교해 불일치 여부를 정하고, 격차를 하나의 M·I·D·A·S 축으로 분류한다. "+AXES_TEXT+" 반드시 JSON만 출력.";
  const usr="상황: "+sc.prompt+"\n원자료: "+sc.context.map(c=>c.k+"="+c.v).join(", ")+"\nAI 판단(인간에게는 가려져 있었음): "+sc.aiAnswer+"\n정답/타당 판단: "+sc.correctText+"\n인간이 적은 판단: \"\"\""+humanText+"\"\"\"\nJSON: {\"disagree\":true|false,\"humanRight\":true|false,\"aiRight\":true|false,\"axis\":\"M|I|D|A|S|none\",\"explain\":\"한 줄 근거\"}";
  const j=extractJSON(await callClaude([{role:"user",content:usr}], sys, 400));
  const disagree=!!j.disagree; const ax=cleanAxis(j.axis);
  return {type:"blind",result:disagree?"disagree":"agree",disagree,humanRight:!!j.humanRight,aiRight:!!j.aiRight,isSignal:disagree,axis:disagree?(ax||"D"):null,explain:j.explain||""};
}
async function judgeTrap(sc, humanText){
  const sys="너는 MIDAS TOUCH 그림자 감사의 평가자다. AI 판단(제시됨)이 틀렸는지 아는 상태에서, 인간이 그 오류를 수용했는지·잡아냈는지·(AI가 옳은데) 과잉 반박했는지 평가하고 격차를 M·I·D·A·S 축으로 분류한다. "+AXES_TEXT+" 반드시 JSON만 출력.";
  const usr="판단 대상: "+sc.title+"\n원자료: "+sc.context.map(c=>c.k+"="+c.v).join(", ")+"\nAI 판단(인간에게 제시됨, 실제로 "+(sc.aiWrong?"틀림":"타당함")+"): "+sc.aiAnswer+"\n정답: "+sc.correctText+"\n인간이 적은 판단: \"\"\""+humanText+"\"\"\"\nJSON: {\"missed\":true|false,\"caught\":true|false,\"falsealarm\":true|false,\"axis\":\"M|I|D|A|S|none\",\"explain\":\"한 줄 근거\"}";
  const j=extractJSON(await callClaude([{role:"user",content:usr}], sys, 400));
  let outcome = j.missed?"missed":(j.falsealarm?"falsealarm":(j.caught?"caught":"ok"));
  const ax=cleanAxis(j.axis); const isSignal=(outcome==="missed"||outcome==="falsealarm");
  return {type:"trap",outcome,aiWrong:sc.aiWrong,isSignal,axis:isSignal?(ax||(outcome==="falsealarm"?"A":"I")):null,explain:j.explain||""};
}

/* ---------- 내장 예시(폴백) 정규화 & 규칙 판정 ---------- */
function normBank(sc){
  if(sc.type==="blind") return {type:"blind",stage:sc.stage,title:sc.title,context:sc.context,prompt:sc.prompt,answerMode:"choice",options:sc.options,aiIdx:sc.ai,correctIdx:sc.correct,aiAnswer:sc.options[sc.ai],aiConf:92,aiWrong:false,correctText:sc.options[sc.correct]+" — "+sc.why,hintAxis:sc.hintAxis||null,why:sc.why,mode:"bank"};
  return {type:"trap",stage:sc.stage,title:sc.title,context:sc.context,prompt:"AI 판단을 그대로 적용할까요? 원자료를 보고 결정하세요.",answerMode:"choice",options:TRAP_CHOICES,aiAnswer:sc.aiText,aiConf:sc.aiConf,aiWrong:sc.aiWrong,correctText:sc.correctNote,hintAxis:sc.hintAxis||null,mode:"bank"};
}
function suggestBankBlind(sc,dis,hr,ar){ if(!dis)return null; if(sc.hintAxis)return sc.hintAxis; if(hr)return "M"; if(ar)return "A"; return "D"; }
function computeChoice(sc,choice){
  if(sc.type==="blind"){
    const disagree=choice!==sc.aiIdx, humanRight=choice===sc.correctIdx, aiRight=sc.aiIdx===sc.correctIdx;
    return {type:"blind",result:disagree?"disagree":"agree",disagree,humanRight,aiRight,isSignal:disagree,axis:suggestBankBlind(sc,disagree,humanRight,aiRight),explain:""};
  }
  const accepted=choice===0; let outcome= sc.aiWrong?(accepted?"missed":"caught"):(choice===1?"falsealarm":"ok");
  const isSignal=(outcome==="missed"||outcome==="falsealarm");
  return {type:"trap",outcome,aiWrong:sc.aiWrong,isSignal,axis: outcome==="missed"?(sc.hintAxis||"I"):(outcome==="falsealarm"?"A":null),explain:""};
}
function makeProbeRec(projId,sc,session,res,when){
  return {id:uid(),projId,stage:sc.stage,type:sc.type,title:sc.title,scenario:sc,
    answerMode:sc.answerMode, humanText:session.humanText||"", choice:(session.choice!=null?session.choice:null),
    result:res.result||null, outcome:res.outcome||null, aiWrong:!!sc.aiWrong,
    humanRight:!!res.humanRight, aiRight:!!res.aiRight, isSignal:res.isSignal,
    axis:null, reason:"", explain:res.explain||"", rehearsed:false, createdAt:when||Date.now()};
}

/* ---------- 통계 / 위험 ---------- */
function axisRepeat(projId,stage){const m={};state.probes.filter(p=>p.projId===projId&&p.stage===stage&&p.isSignal&&p.axis).forEach(p=>m[p.axis]=(m[p.axis]||0)+1);return m;}
function stageStats(projId,stage){
  const ps=state.probes.filter(p=>p.projId===projId&&p.stage===stage);
  const blind=ps.filter(p=>p.type==="blind"); const dis=blind.filter(p=>p.result==="disagree").length;
  const tw=ps.filter(p=>p.type==="trap"&&p.aiWrong); const miss=tw.filter(p=>p.outcome==="missed").length;
  const rep=axisRepeat(projId,stage); const maxRep=Object.keys(rep).reduce((m,k)=>Math.max(m,rep[k]),0);
  return {total:ps.length,blind:blind.length,dis,disRate:blind.length?dis/blind.length:0,tw:tw.length,miss,missRate:tw.length?miss/tw.length:0,maxRep};
}
function stageRisk(s){
  if(s.total===0) return {badge:"측정 전",cls:"b-g",fill:"f-g",w:5};
  let badge,cls,fill;
  if(s.maxRep>=3||(s.disRate>=0.4&&s.missRate>=0.3)){badge="Red";cls="b-r";fill="f-r";}
  else if(s.missRate>=0.34){badge="Orange";cls="b-o";fill="f-o";}
  else if(s.disRate>=0.4){badge="Yellow";cls="b-y";fill="f-y";}
  else {badge="Green";cls="b-g";fill="f-g";}
  const w=Math.max(8,Math.min(100,Math.round(s.disRate*45+s.missRate*55+s.maxRep*12)));
  return {badge,cls,fill,w};
}
function projStats(projId){
  const ps=state.probes.filter(p=>p.projId===projId);
  const blind=ps.filter(p=>p.type==="blind"); const dis=blind.filter(p=>p.result==="disagree").length;
  const tw=ps.filter(p=>p.type==="trap"&&p.aiWrong); const miss=tw.filter(p=>p.outcome==="missed").length;
  const signals=ps.filter(p=>p.isSignal); const classified=signals.filter(p=>p.axis); const reh=classified.filter(p=>p.rehearsed).length;
  const axisCount={}; AX_ORDER.forEach(a=>axisCount[a]=0); classified.forEach(p=>{if(axisCount[p.axis]!=null)axisCount[p.axis]++;});
  return {total:ps.length,blindN:blind.length,twN:tw.length,
    disRate:blind.length?Math.round(dis/blind.length*100):0,
    missRate:tw.length?Math.round(miss/tw.length*100):0,
    rehRate:classified.length?Math.round(reh/classified.length*100):0,
    signals:signals.length,classified:classified.length,reh,pending:signals.length-classified.length,axisCount};
}

function resultTag(p){

  if(p.outcome==="missed")return {txt:"오답 미인지",cls:"cs-open"};
  if(p.outcome==="caught")return {txt:"오답 감지",cls:"cs-done"};
  if(p.outcome==="falsealarm")return {txt:"과잉 의심",cls:"cs-open"};
  return {txt:"정상",cls:"cs-done"};
}

  } else {
    if(res.outcome==="missed"){cls="signal";head="⚑ 오답 미인지 — AI의 틀린 답을 수용";}

    else if(res.outcome==="falsealarm"){cls="warn";head="△ 과잉 의심 — AI가 옳았는데 반박";}

    rows=`<div class="rv-cmp"><div class="rc"><div class="rl">인간 판단</div><div class="rvv" style="font-weight:${hcWeight}">${hc}</div></div><div class="rc"><div class="rl">AI 판단</div><div class="rvv">${esc(sc.aiAnswer)} ${sc.aiWrong?'<span style="color:var(--red);font-size:10px;font-weight:800">· 주입된 오답</span>':'<span style="color:var(--teal);font-size:10px;font-weight:800">· 정상</span>'}</div></div></div>
      <div class="rv-row" style="margin-top:8px">${esc(sc.correctText)}</div>`;
  }

  let clf="";
  if(res.isSignal){
    const sug=session.axis||res.axis||"D";

    const axbtns=AX_ORDER.map(a=>{const ax=AXES[a];const on=session.axis===a;const isSug=(a===sug&&!session.axis);

    clf=`<div class="clf">
      <div class="clf-q">이 격차를 어느 축으로 분류할까요? <span style="color:var(--muted2)">(사후 검증: 누가 놓쳤나 × 왜)</span></div>
      <div class="axgrid">${axbtns}</div>
      ${ca?`<div class="sugnote"><b>${chosen} · ${esc(ca.kr)} (${esc(ca.name)})</b> — ${esc(ca.desc)}<br><span style="color:var(--muted2)">조치:</span> ${esc(ca.action)}${!session.axis?' <span style="color:var(--muted2)">· '+(aiOn()?"AI 추천값":"추천값")+', 바꿀 수 있어요</span>':''}</div>`:""}
      ${repTot>=2?`<div class="sugnote" style="color:var(--red)">⚠ 이 단계에서 같은 유형이 ${repTot}회 반복 — <b>S(시스템 경보)</b>도 고려하세요.</div>`:""}
      <div style="margin-top:10px"><div class="clf-q">메모(선택) — 사후 검증 근거</div><textarea class="rehearse-in" id="reasonBox" placeholder="예: 고온 프로파일 미검토가 원인" oninput="APP.setReason(this.value)">${esc(session.reason||"")}</textarea></div>
    </div>`;
  }
  $("view-probe").innerHTML=`
  <div class="grid2">
    <div>
      <div class="card"><div class="card-pad" style="padding-bottom:6px">
        <h2>${isBlind?"답변 가리기 · Blind Shadow":"오답 트랩 · Shadow Trap"} <span class="ey">${esc(sc.stage)}</span></h2>
        <div class="sub">${esc(sc.title)}</div>

}

let memFilter="all";
function renderMemory(){
  const proj=currentProj();
  const all=state.probes.filter(p=>p.projId===proj.id&&p.isSignal).sort((a,b)=>b.createdAt-a.createdAt);
  const classified=all.filter(p=>p.axis), pending=all.filter(p=>!p.axis);
  const shown=memFilter==="all"?classified:memFilter==="pending"?pending:classified.filter(p=>p.axis===memFilter);
  const pills=[["all","전체"],["pending","미분류 "+pending.length]].concat(AX_ORDER.map(a=>[a,a+" "+classified.filter(p=>p.axis===a).length]))
    .map(([k,l])=>`<button class="fpill ${memFilter===k?"active":""}" onclick="APP.filterMemory('${k}')">${esc(l)}</button>`).join("");
  const list = shown.length? shown.map(p=>caseRow(p,false)).join("")
    : `<div class="empty"><b>${memFilter==="pending"?"미분류 신호가 없습니다":"해당 축의 기록이 없습니다"}</b>그림자 감사에서 불일치·오답 미인지가 나오면 여기에 분류·저장됩니다.</div>`;
  $("view-memory").innerHTML=`
  <div class="card"><div class="card-pad">
    <h2>🗄️ Shadow Memory <span class="ey">분류된 격차 · ${classified.length}건</span></h2>
    <div class="sub">사후 검증으로 <b>M·I·D·A·S</b> 축에 분류된 사례가 저장됩니다. 각 사례는 자동으로 <b>‘오답 리허설 문제’</b>가 됩니다.</div>
    <div class="divide"></div>
    <div class="pillrow">${pills}</div>
    <div class="caselist">${list}</div>
  </div></div>
  <div class="foot-note">분류된 오답 → Shadow Memory → 리허설 문제 → 사람 재훈련</div>`;
}
function caseRow(p,rehMode){
  const tag=resultTag(p); const ax=p.axis?AXES[p.axis]:null;
  const status = p.rehearsed?`<span class="cstatus cs-done">리허설 이수</span>`:(p.axis?`<span class="cstatus cs-open">리허설 대기</span>`:`<span class="cstatus cs-pending">미분류</span>`);
  const btn = rehMode?`<button class="btn" style="padding:7px 12px;font-size:12px" onclick="APP.openRehearse('${p.id}')">${p.rehearsed?"다시 풀기":"리허설 풀기 →"}</button>`
    : (!p.axis?`<button class="btn" style="padding:7px 12px;font-size:12px" onclick="APP.reopen('${p.id}')">분류하기</button>`:"");
  return `<div class="caserow ${ax?ax.cls:""}">
    ${ax?`<span class="axletter" style="margin-top:1px">${p.axis}</span>`:`<span class="axletter" style="background:var(--muted2);margin-top:1px">?</span>`}
    <div class="cx">
      <div class="ct">${esc(p.title)} ${ax?`<span class="axchip ${ax.cls}" style="margin-left:4px"><span class="axletter">${p.axis}</span>${esc(ax.kr)}</span>`:""}</div>
      <div class="cm">${ax?esc(ax.desc):"사후 검증·분류가 필요합니다"}${p.reason?` · <span style="color:var(--ink)">${esc(p.reason)}</span>`:""}</div>
      <div class="cmeta"><span>${esc(p.stage)}</span><span>${p.type==="blind"?"Blind":"Trap"}</span><span>${tag.txt}</span><span>${ax?"조치: "+esc(ax.action):""}</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">${status}${btn}</div>
  </div>`;
}

/* ==================================================================

let rehFilter="open";
function renderRehearse(){
  const proj=currentProj();
  const classified=state.probes.filter(p=>p.projId===proj.id&&p.isSignal&&p.axis);
  const open=classified.filter(p=>!p.rehearsed), done=classified.filter(p=>p.rehearsed);
  const shown=rehFilter==="open"?open:rehFilter==="done"?done:classified;
  const st=projStats(proj.id);
  const pills=[["open","리허설 대기 "+open.length],["done","이수 "+done.length],["all","전체"]]
    .map(([k,l])=>`<button class="fpill ${rehFilter===k?"active":""}" onclick="APP.filterReh('${k}')">${esc(l)}</button>`).join("");
  const list=shown.length? shown.map(p=>caseRow(p,true)).join("")
    : `<div class="empty"><b>${rehFilter==="open"?"대기 중인 리허설이 없습니다":"이수한 리허설이 없습니다"}</b>Shadow Memory에 분류된 오답이 리허설 문제가 됩니다.</div>`;
  $("view-rehearse").innerHTML=`
  <div class="card"><div class="card-pad">
    <h2>🔁 오답 리허설 <span class="ey">Rehearsal · 이수율 ${st.rehRate}%</span></h2>
    <div class="sub">실제로 틀렸던 그 문제를 <b>다시 풀며</b> 판단력을 되찾습니다 — 사라졌던 ‘문제’가 사람에게 돌아옵니다. 같은 유형이 반복되면 위험 지도의 등급이 오릅니다.</div>
    <div class="divide"></div>
    <div class="pillrow">${pills}</div>
    <div class="caselist">${list}</div>
  </div></div>
  <div class="foot-note">포드가 베테랑 350명으로 후배를 가르치고 AI를 재훈련시킨 구조 — MIDAS TOUCH는 이를 지표로 자동화합니다.</div>`;
}
function markRehearsed(p){ p.rehearsed=true; persist(); toast("리허설 이수 — 판단력 복원"); setTimeout(()=>{closeModal();refresh();},900); }
function openRehearse(id){
  const p=state.probes.find(x=>x.id===id); if(!p)return; const sc=p.scenario; if(!sc){toast("문항 정보를 찾을 수 없습니다");return;}
  const isBlind=sc.type==="blind"; const isText=sc.answerMode==="text";
  const ctx=sc.context.map(c=>`<div class="dataline"><span class="k">${esc(c.k)}</span><span class="v ${c.warn?"warn":""}">${esc(c.v)}</span></div>`).join("");
  let answerUI;
  if(isText){
    answerUI=`<textarea class="ans-in" id="rehText" placeholder="다시 판단해 보세요 — 근거까지"></textarea>
      <button class="btn primary block" style="margin-top:8px" onclick="APP.rehearseSubmit('${id}')">다시 제출${aiOn()?" · AI 평가":""}</button>`;
  } else {
    answerUI=`<div id="rehOpts">${sc.options.map((o,i)=>`<button class="btn block" style="text-align:left;margin-bottom:6px" onclick="APP.rehearseAnswer('${id}',${i})">${esc(o)}</button>`).join("")}</div>`;
  }
  openModal(`<div class="modal-scroll"><h3>🔁 오답 리허설 — ${esc(sc.title)}</h3>
    <p>${esc(sc.stage)} · ${isBlind?"이번엔 AI 없이 스스로":"AI 답에 휘둘리지 말고"} 다시 판단해 보세요.</p>
    <div style="border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:12px">${ctx}${!isBlind?`<div class="ai-shown" style="margin-top:9px"><div class="ail">AI 판단</div><div class="aiv" style="font-size:13px">${esc(sc.aiAnswer)}</div></div>`:""}</div>
    <div class="lab">${isBlind?esc(sc.prompt):"AI 판단을 적용할까요?"}</div>
    ${answerUI}
    <div id="rehFb" style="font-size:12px;margin-top:8px;line-height:1.5"></div>
    <div class="modal-act"><button class="btn" onclick="closeModal()">닫기</button></div></div>`);
}
function rehearseAnswer(id,idx){
  const p=state.probes.find(x=>x.id===id); const sc=p.scenario; const fb=$("rehFb");
  const correct = sc.type==="blind" ? (idx===sc.correctIdx) : (sc.aiWrong ? (idx!==0) : (idx===0));
  if(correct){ fb.innerHTML=`<span style="color:var(--teal);font-weight:800">✓ 정답 — 리허설 이수.</span>`; markRehearsed(p); }
  else { fb.innerHTML=`<span style="color:var(--red);font-weight:800">✗ 다시 생각해 보세요.</span> <span style="color:var(--muted)">${esc(sc.correctText||"")}</span>`; }
}
async function rehearseSubmit(id){
  const p=state.probes.find(x=>x.id===id); const sc=p.scenario; const fb=$("rehFb"); const t=($("rehText").value||"").trim();
  if(!t){ fb.textContent="판단을 입력하세요"; return; }
  if(!aiOn()){ fb.innerHTML=`<span style="color:var(--red)">서술형 재평가는 AI 연결이 필요합니다.</span>`; return; }
  fb.innerHTML=`<span style="color:var(--muted)">AI가 평가 중…</span>`;
  try{
    const res = sc.type==="blind" ? await judgeBlind(sc,t) : await judgeTrap(sc,t);
    const good = sc.type==="blind" ? (res.humanRight) : (res.outcome==="caught" || (!sc.aiWrong && res.outcome!=="falsealarm"));
    if(good){ fb.innerHTML=`<span style="color:var(--teal);font-weight:800">✓ 판단력 회복 — 리허설 이수.</span> <span style="color:var(--muted)">${esc(res.explain||"")}</span>`; markRehearsed(p); }
    else { fb.innerHTML=`<span style="color:var(--red);font-weight:800">✗ 아직 아쉽습니다.</span> <span style="color:var(--muted)">${esc(res.explain||sc.correctText||"")}</span>`; }
  }catch(e){ fb.innerHTML=`<span style="color:var(--red)">평가 실패: ${esc(e.message)}</span>`; }
}

function projModalHTML(){

function redrawStages(focusLast){

function updateAIBadge(){ const b=$("aiBadge"); if(!b)return; const on=aiOn(); b.textContent=on?"AI 연결됨":"AI 미연결"; b.className="aibadge "+(on?"on":"off"); }

const APP={
  setView(v){ state.view=v; renderCurrentView(); },
  selectProj(id){ state.projId=id; session=null; stageFilter=null; refresh(); },
  addProj(){ pdraft={name:"",domain:"",stages:DEFAULT_STAGES.slice()}; openModal(projModalHTML()); setTimeout(()=>{const i=$("pdName");if(i)i.focus();},50); },
  setPName(v){ pdraft.name=v; },
  setPDomain(v){ pdraft.domain=v; },
  editStage(i,v){ pdraft.stages[i]=v; },
  addStage(){ pdraft.stages.push(""); redrawStages(true); },
  delStage(i){ pdraft.stages.splice(i,1); redrawStages(false); },
  saveNewProj(){ const name=(pdraft.name||"").trim(); const stages=pdraft.stages.map(s=>s.trim()).filter(Boolean);
    if(!name){toast("프로젝트 이름을 입력하세요");return;} if(!stages.length){toast("단계를 최소 1개 입력하세요");return;}
    const p={id:"p_"+uid(),name,domain:(pdraft.domain||"").trim(),stages}; state.projects.push(p); state.projId=p.id; stageFilter=null; persist(); closeModal(); toast("프로젝트 등록됨 · 과정 "+stages.length+"단계"); refresh(); },
  resetData(){ if(!confirm("이 기기에 보이는 모든 감사 기록을 삭제할까요? 되돌릴 수 없습니다.")) return;
    state.probes=[]; persist(); toast("데이터 초기화됨"); refresh(); },
  seedDemo(){ const proj=currentProj(); const stages=(proj.stages&&proj.stages.length)?proj.stages:DEFAULT_STAGES;
    for(let i=0;i<14;i++){ const raw=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)]; const sc=normBank(raw); sc.stage=stages[Math.floor(Math.random()*stages.length)];
      let choice = sc.type==="blind" ? (Math.random()<0.5?sc.correctIdx:(Math.random()<0.6?sc.aiIdx:Math.floor(Math.random()*sc.options.length))) : (Math.random()<0.45?0:(Math.random()<0.6?1:(Math.random()<0.5?2:3)));
      const res=computeChoice(sc,choice); const rec=makeProbeRec(proj.id,sc,{humanText:"",choice},res,Date.now()-i*3600000);
      if(rec.isSignal){ rec.axis=res.axis||"D"; rec.rehearsed=Math.random()<0.4; }
      state.probes.push(rec);
    } persist(); toast("데모 데이터 14건 생성"); refresh(); },
  setStageFilter(s){ stageFilter=s; renderProbe(); },
  async startProbe(){
    const proj=currentProj(); const type=Math.random()<0.5?"blind":"trap";
    const stages=(proj.stages&&proj.stages.length)?proj.stages:DEFAULT_STAGES;
    const stage=stageFilter||stages[Math.floor(Math.random()*stages.length)];
    if(aiOn()){
      session={phase:"gen",type,stage,sc:null,humanText:"",choice:null,res:null,axis:null,reason:""}; state.view="probe"; renderCurrentView();
      try{ const sc=await generateProbe(proj,stage,type); if(!session||session.phase!=="gen")return; session.sc=sc; session.phase="scene"; renderProbe(); }
      catch(e){ toast("문항 생성 실패: "+e.message); session=null; renderProbe(); }
    } else {
      const raw=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)]; const sc=normBank(raw); sc.stage=stage;
      session={phase:"scene",type:sc.type,stage,sc,humanText:"",choice:null,res:null,axis:null,reason:""}; state.view="probe"; renderCurrentView();
    }
  },
  choose(i){ session.choice=i; renderProbeScene(currentProj()); },
  setAnswer(v){ session.humanText=v; },
  async submit(){
    if(!session)return; const sc=session.sc;
    if(sc.answerMode==="text"){
      const t=(session.humanText||"").trim(); if(!t){toast("판단을 입력하세요");return;}
      session.phase="judge"; renderProbe();
      try{ const res= sc.type==="blind"? await judgeBlind(sc,t): await judgeTrap(sc,t); if(!session||session.phase!=="judge")return; session.res=res; session.axis=null; session.phase="reveal"; renderProbe(); }
      catch(e){ toast("판단 평가 실패: "+e.message); session.phase="scene"; renderProbe(); }
    } else {
      if(session.choice==null){toast("판단을 선택하세요");return;}
      session.res=computeChoice(sc,session.choice); session.axis=null; session.phase="reveal"; renderProbe();
    }
  },
  selectAxis(a){ session.axis=a; renderProbeReveal(currentProj()); },
  setReason(v){ session.reason=v; },
  saveProbe(){
    if(session&&session.editId){ const p=state.probes.find(x=>x.id===session.editId);
      if(p){ p.axis=session.axis||(session.res&&session.res.axis)||"D"; p.reason=session.reason||""; persist(); session=null; toast("분류 저장됨"); state.view="memory"; renderCurrentView(); return; } }
    const sc=session.sc,res=session.res; const rec=makeProbeRec(currentProj().id,sc,session,res);
    if(res.isSignal){ rec.axis=session.axis||res.axis||"D"; rec.reason=session.reason||""; }
    state.probes.push(rec); persist(); session=null;
    toast(res.isSignal?"Shadow Memory에 분류·저장됨":"기록 저장됨"); renderProbe(); },
  cancelProbe(){ session=null; state.view="probe"; renderCurrentView(); },
  filterMemory(k){ memFilter=k; renderMemory(); },
  reopen(id){ const p=state.probes.find(x=>x.id===id); if(!p)return;
    const res={type:p.type,result:p.result,outcome:p.outcome,disagree:p.result==="disagree",humanRight:p.humanRight,aiRight:p.aiRight,aiWrong:p.aiWrong,isSignal:p.isSignal,axis:p.axis||null,explain:p.explain||""};
    session={phase:"reveal",type:p.type,stage:p.stage,sc:p.scenario,humanText:p.humanText||"",choice:p.choice,res,axis:null,reason:p.reason||"",editId:id};
    state.view="probe"; renderCurrentView(); },
  filterReh(k){ rehFilter=k; renderRehearse(); },
  openRehearse(id){ openRehearse(id); },
  rehearseAnswer(id,idx){ rehearseAnswer(id,idx); },
  rehearseSubmit(id){ rehearseSubmit(id); },
  aiSettings(){ const k=getKey();
    openModal(`<div class="modal-scroll"><h3>AI 연결 설정</h3>
      <p>프로젝트 과정에 맞춘 <b>감사 문항 생성</b>과 <b>서술형 판단 평가</b>에는 Anthropic API 키가 필요합니다. 키는 이 브라우저(localStorage)에만 저장되며 서버로 전송되지 않습니다.</p>
      <label class="lab">Anthropic API Key</label>
      <input id="aiKey" type="password" placeholder="sk-ant-..." value="${esc(k)}">
      <div style="font-size:11px;color:var(--muted2);margin-top:6px;line-height:1.55">console.anthropic.com에서 발급 · 모델 <code>${AI_MODEL}</code> · 키가 없으면 내장 예시 문항(객관식)으로 동작합니다.<br>팀 공용으로 안전하게 쓰려면 서버리스 프록시(키를 서버에 보관)를 권장합니다.</div>
      <div class="modal-act"><button class="btn" onclick="closeModal()">취소</button>${k?`<button class="btn" onclick="APP.clearKey()">키 삭제</button>`:""}<button class="btn primary" onclick="APP.saveKey()">저장</button></div></div>`);
    setTimeout(()=>{const i=$("aiKey");if(i)i.focus();},50); },
  saveKey(){ const v=($("aiKey").value||"").trim(); try{localStorage.setItem(AI_KEY_LS,v);}catch(e){} closeModal(); updateAIBadge(); toast(v?"AI 연결됨":"저장됨"); if(state.view==="probe"&&!session)renderProbe(); },
  clearKey(){ try{localStorage.removeItem(AI_KEY_LS);}catch(e){} closeModal(); updateAIBadge(); toast("키 삭제됨"); if(state.view==="probe"&&!session)renderProbe(); }
};
window.APP=APP; window.closeModal=closeModal;

/* ---------- 시작 ---------- */
function init(){
  $("tabs").addEventListener("click",e=>{const b=e.target.closest("button[data-view]"); if(b)APP.setView(b.dataset.view);});
  $("projSel").addEventListener("change",e=>APP.selectProj(e.target.value));
  $("addProj").addEventListener("click",()=>APP.addProj());
  $("resetData").addEventListener("click",()=>APP.resetData());
  $("aiBtn").addEventListener("click",()=>APP.aiSettings());
  $("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal();});
  updateAIBadge();
  loadData();
}
init();
</script>
</body>
</html>
